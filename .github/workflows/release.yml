name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tkinter dependency (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run tests
        run: python -m unittest discover -s src/tests -t src

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name SimpleChess --add-data "src/gui/assets;gui/assets" --add-binary "src/ai/stockfish/windows/avx2/stockfish-windows-x86-64-avx2.exe;ai/stockfish/windows/avx2" --add-binary "src/ai/stockfish/windows/non-avx2/stockfish-windows-x86-64.exe;ai/stockfish/windows/non-avx2" --add-data "src/ai/stockfish/windows/shared;ai/stockfish/windows/shared" src/main.py
      
      - name: Restore signing certificate (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WIN_CERT_PFX_BASE64: ${{ secrets.WIN_CERT_PFX_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WIN_CERT_PFX_BASE64)) { throw "Missing secret WIN_CERT_PFX_BASE64" }
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\codesign.pfx", [Convert]::FromBase64String($env:WIN_CERT_PFX_BASE64))

      - name: Sign and verify executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WIN_CERT_PASSWORD)) { throw "Missing secret WIN_CERT_PASSWORD" }

          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "\\x64\\signtool\.exe$" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found on runner" }
          try {
            & $signtool.FullName sign `
              /fd SHA256 `
              /td SHA256 `
              /tr http://timestamp.digicert.com `
              /f "$env:RUNNER_TEMP\codesign.pfx" `
              /p "$env:WIN_CERT_PASSWORD" `
              "dist\SimpleChess.exe"
          }
          finally {
            Remove-Item "$env:RUNNER_TEMP\codesign.pfx" -ErrorAction SilentlyContinue
          }

      - name: Build executable (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name SimpleChess --add-data "src/gui/assets:gui/assets" src/main.py

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/SimpleChess.exe -DestinationPath dist/SimpleChess-windows-x64.zip -Force

      - name: Set package file (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "PACKAGE_FILE=dist/SimpleChess-windows-x64.zip" >> $env:GITHUB_ENV

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          tar -czf dist/SimpleChess-macos-x64.tar.gz -C dist SimpleChess

      - name: Set package file (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "PACKAGE_FILE=dist/SimpleChess-macos-x64.tar.gz" >> "$GITHUB_ENV"

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          tar -czf dist/SimpleChess-linux-x64.tar.gz -C dist SimpleChess

      - name: Set package file (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "PACKAGE_FILE=dist/SimpleChess-linux-x64.tar.gz" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: simplechess-${{ runner.os }}
          path: ${{ env.PACKAGE_FILE }}

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PACKAGE_FILE }}
          generate_release_notes: true
