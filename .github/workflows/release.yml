name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tkinter dependency (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run tests
        run: python -m unittest discover -s src/tests -t src

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --noconfirm --clean SimpleChess.spec
      
      - name: Restore signing certificate (Windows)
        if: runner.os == 'Windows' && secrets.WIN_CERT_PFX_BASE64 != '' && secrets.WIN_CERT_PASSWORD != ''
        shell: pwsh
        env:
          WIN_CERT_PFX_BASE64: ${{ secrets.WIN_CERT_PFX_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WIN_CERT_PFX_BASE64)) { throw "Missing secret WIN_CERT_PFX_BASE64" }
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\codesign.pfx", [Convert]::FromBase64String($env:WIN_CERT_PFX_BASE64))

      - name: Sign and verify executable (Windows)
        if: runner.os == 'Windows' && secrets.WIN_CERT_PFX_BASE64 != '' && secrets.WIN_CERT_PASSWORD != ''
        shell: pwsh
        env:
          WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WIN_CERT_PASSWORD)) { throw "Missing secret WIN_CERT_PASSWORD" }

          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "\\x64\\signtool\.exe$" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found on runner" }
          & $signtool.FullName sign `
            /fd SHA256 `
            /td SHA256 `
            /tr http://timestamp.digicert.com `
            /f "$env:RUNNER_TEMP\codesign.pfx" `
            /p "$env:WIN_CERT_PASSWORD" `
            "dist\SimpleChess.exe"

      - name: Install Inno Setup (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          if ([string]::IsNullOrWhiteSpace($version)) { $version = "0.0.0" }
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$version" "installer\SimpleChess.iss"

      - name: Sign installer (Windows)
        if: runner.os == 'Windows' && secrets.WIN_CERT_PFX_BASE64 != '' && secrets.WIN_CERT_PASSWORD != ''
        shell: pwsh
        env:
          WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WIN_CERT_PASSWORD)) { throw "Missing secret WIN_CERT_PASSWORD" }
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "\\x64\\signtool\.exe$" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found on runner" }
          & $signtool.FullName sign `
            /fd SHA256 `
            /td SHA256 `
            /tr http://timestamp.digicert.com `
            /f "$env:RUNNER_TEMP\codesign.pfx" `
            /p "$env:WIN_CERT_PASSWORD" `
            "dist\SimpleChess-windows-x64-installer.exe"

      - name: Cleanup signing certificate (Windows)
        if: runner.os == 'Windows' && secrets.WIN_CERT_PFX_BASE64 != '' && secrets.WIN_CERT_PASSWORD != ''
        shell: pwsh
        run: |
          Remove-Item "$env:RUNNER_TEMP\codesign.pfx" -ErrorAction SilentlyContinue

      - name: Ensure Stockfish executable bits (macOS)
        if: runner.os == 'macOS'
        run: |
          chmod +x src/ai/stockfish/macos/avx2/stockfish-macos-x86-64-avx2
          chmod +x src/ai/stockfish/macos/non-avx2/stockfish-macos-x86-64

      - name: Build executable (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --noconfirm --clean --windowed --name SimpleChess --add-data "src/gui/assets:gui/assets" --add-binary "src/ai/stockfish/macos/avx2/stockfish-macos-x86-64-avx2:ai/stockfish/macos/avx2" --add-binary "src/ai/stockfish/macos/non-avx2/stockfish-macos-x86-64:ai/stockfish/macos/non-avx2" --add-data "src/ai/stockfish/shared:ai/stockfish/shared" src/main.py

      - name: Ensure Stockfish executable bits (Linux)
        if: runner.os == 'Linux'
        run: |
          chmod +x src/ai/stockfish/ubuntu/avx2/stockfish-ubuntu-x86-64-avx2
          chmod +x src/ai/stockfish/ubuntu/non-avx2/stockfish-ubuntu-x86-64

      - name: Build executable (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller --noconfirm --clean SimpleChess.spec

      - name: Build AppImage (Linux)
        if: runner.os == 'Linux'
        run: |
          rm -rf AppDir
          mkdir -p AppDir/usr/bin
          cp dist/SimpleChess AppDir/usr/bin/SimpleChess
          chmod +x AppDir/usr/bin/SimpleChess
          cp src/gui/assets/wK.png AppDir/simplechess.png
          cat > AppDir/simplechess.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Simple Chess
          Exec=SimpleChess
          Icon=simplechess
          Categories=Game;
          EOF
          cat > AppDir/AppRun << 'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/SimpleChess" "$@"
          EOF
          chmod +x AppDir/AppRun
          wget -q -O appimagetool-x86_64.AppImage "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool-x86_64.AppImage
          APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool-x86_64.AppImage AppDir dist/SimpleChess-linux-x64.AppImage

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\SimpleChess-windows-x64-installer.exe")) {
            throw "Windows installer was not produced"
          }

      - name: Set package file (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "PACKAGE_FILE=dist/SimpleChess-windows-x64-installer.exe" >> $env:GITHUB_ENV

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          if [ ! -d dist/SimpleChess.app ]; then
            echo "macOS app bundle was not produced"
            exit 1
          fi
          tar -czf dist/SimpleChess-macos-x64.app.tar.gz -C dist SimpleChess.app

      - name: Set package file (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "PACKAGE_FILE=dist/SimpleChess-macos-x64.app.tar.gz" >> "$GITHUB_ENV"

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          if [ ! -f dist/SimpleChess-linux-x64.AppImage ]; then
            echo "Linux AppImage was not produced"
            exit 1
          fi

      - name: Set package file (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "PACKAGE_FILE=dist/SimpleChess-linux-x64.AppImage" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: simplechess-${{ runner.os }}
          path: ${{ env.PACKAGE_FILE }}

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PACKAGE_FILE }}
          generate_release_notes: true
