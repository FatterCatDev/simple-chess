name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tkinter dependency (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run tests
        run: python -m unittest discover -s src/tests -t src

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name SimpleChess --add-data "src/gui/assets;gui/assets" src/main.py

      - name: Build executable (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name SimpleChess --add-data "src/gui/assets:gui/assets" src/main.py

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/SimpleChess.exe -DestinationPath dist/SimpleChess-windows-x64.zip -Force

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          tar -czf dist/SimpleChess-macos-x64.tar.gz -C dist SimpleChess

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          tar -czf dist/SimpleChess-linux-x64.tar.gz -C dist SimpleChess

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: simplechess-${{ runner.os }}
          path: |
            dist/SimpleChess-windows-x64.zip
            dist/SimpleChess-macos-x64.tar.gz
            dist/SimpleChess-linux-x64.tar.gz

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/SimpleChess-windows-x64.zip
            dist/SimpleChess-macos-x64.tar.gz
            dist/SimpleChess-linux-x64.tar.gz
          generate_release_notes: true
